server:
  port: 3000

spring:
  application:
    name: spring-boot
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:admin_panel}?currentSchema=public
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:admin}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: public

app:
  auth:
    jwt:
      # Use >= 32 bytes for HS256, or pass base64:<...> to decode.
      access-secret: ${JWT_ACCESS_SECRET:base64:9MqdgTYJjG6gH8vYQp0o4Mdu0Aq5dE4S6cC1dQx2tE0=}
      access-ttl: ${JWT_ACCESS_TTL:15m}
    refresh:
      ttl-days: ${REFRESH_TTL_DAYS:7}
      ttl-remember-days: ${REFRESH_TTL_REMEMBER_DAYS:30}
