spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

app:
  auth:
    jwt:
      access-secret: test-secret-test-secret-test-secret-test-secret
      access-ttl: 15m
    refresh:
      ttl-days: 7
      ttl-remember-days: 30
